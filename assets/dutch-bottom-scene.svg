<svg viewBox="0 0 1440 300" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <!-- Blue base (fills entire bottom) -->
  <path d="
    M0,200 
    C240,180 480,220 720,200 
    C960,180 1200,220 1440,200 
    L1440,300 
    L0,300 
    Z" 
    fill="#1f4a7c"/>

  <!-- White stripe -->
  <path d="
    M0,180 
    C240,160 480,200 720,180 
    C960,160 1200,200 1440,180" 
    fill="none" 
    stroke="#ffffff" 
    stroke-width="12"/>

  <!-- Orange stripe -->
  <path d="
    M0,160 
    C240,140 480,180 720,160 
    C960,140 1200,180 1440,160" 
    fill="none" 
    stroke="#f47c20" 
    stroke-width="20"/>
</svg>